AWSTemplateFormatVersion: '2010-09-09'
Description: "CPTrack Stack 1/5 — Network: VPC, public/private subnets, Internet Gateway, NAT Gateways, route tables"

Parameters:
  VpcCidr:            { Type: String, Default: "10.0.0.0/16" }
  PublicSubnet1Cidr:  { Type: String, Default: "10.0.1.0/24" }
  PublicSubnet2Cidr:  { Type: String, Default: "10.0.2.0/24" }
  PrivateSubnet1Cidr: { Type: String, Default: "10.0.3.0/24" }
  PrivateSubnet2Cidr: { Type: String, Default: "10.0.4.0/24" }
  Environment:        { Type: String, Default: production }

Resources:

  # ── VPC ──────────────────────────────────────────────────────────────────────
  Vpc:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock:           !Ref VpcCidr
      EnableDnsHostnames:  true   # Required for RDS/Redis DNS
      EnableDnsSupport:    true
      Tags:
        - Key: Name
          Value: !Sub "cptrack-vpc-${Environment}"
        - Key: Environment
          Value: !Ref Environment

  # ── Internet Gateway ──────────────────────────────────────────────────────────
  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub "cptrack-igw-${Environment}"

  VpcGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId:             !Ref Vpc
      InternetGatewayId: !Ref InternetGateway

  # ── Public Subnets (ALB + EC2) ────────────────────────────────────────────────
  PublicSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId:               !Ref Vpc
      CidrBlock:           !Ref PublicSubnet1Cidr
      AvailabilityZone:    !Select [0, !GetAZs ""]
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub "cptrack-public-1-${Environment}"
        - Key: Tier
          Value: Public

  PublicSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId:               !Ref Vpc
      CidrBlock:           !Ref PublicSubnet2Cidr
      AvailabilityZone:    !Select [1, !GetAZs ""]
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub "cptrack-public-2-${Environment}"
        - Key: Tier
          Value: Public

  # ── Private Subnets (RDS + Redis) ─────────────────────────────────────────────
  PrivateSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId:               !Ref Vpc
      CidrBlock:           !Ref PrivateSubnet1Cidr
      AvailabilityZone:    !Select [0, !GetAZs ""]
      MapPublicIpOnLaunch: false   # CRITICAL: no public IPs in private subnets
      Tags:
        - Key: Name
          Value: !Sub "cptrack-private-1-${Environment}"
        - Key: Tier
          Value: Private

  PrivateSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId:               !Ref Vpc
      CidrBlock:           !Ref PrivateSubnet2Cidr
      AvailabilityZone:    !Select [1, !GetAZs ""]
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: !Sub "cptrack-private-2-${Environment}"
        - Key: Tier
          Value: Private

  # ── Elastic IPs for NAT Gateways ──────────────────────────────────────────────
  NatEip1:
    Type: AWS::EC2::EIP
    DependsOn: VpcGatewayAttachment
    Properties:
      Domain: vpc
      Tags:
        - Key: Name
          Value: !Sub "cptrack-nat-eip-1-${Environment}"

  NatEip2:
    Type: AWS::EC2::EIP
    DependsOn: VpcGatewayAttachment
    Properties:
      Domain: vpc
      Tags:
        - Key: Name
          Value: !Sub "cptrack-nat-eip-2-${Environment}"

  # ── NAT Gateways (one per AZ for Active-Active HA) ────────────────────────────
  # Each NAT GW ~$32/mo. For dev, use only NatGateway1 and route both private
  # subnets through it (saves $32/mo, loses AZ-level HA for outbound).
  NatGateway1:
    Type: AWS::EC2::NatGateway
    Properties:
      AllocationId: !GetAtt NatEip1.AllocationId
      SubnetId:     !Ref PublicSubnet1
      Tags:
        - Key: Name
          Value: !Sub "cptrack-nat-1-${Environment}"

  NatGateway2:
    Type: AWS::EC2::NatGateway
    Properties:
      AllocationId: !GetAtt NatEip2.AllocationId
      SubnetId:     !Ref PublicSubnet2
      Tags:
        - Key: Name
          Value: !Sub "cptrack-nat-2-${Environment}"

  # ── Public Route Table ─────────────────────────────────────────────────────────
  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref Vpc
      Tags:
        - Key: Name
          Value: !Sub "cptrack-rtb-public-${Environment}"

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: VpcGatewayAttachment
    Properties:
      RouteTableId:         !Ref PublicRouteTable
      DestinationCidrBlock: "0.0.0.0/0"
      GatewayId:            !Ref InternetGateway

  PublicSubnet1RouteAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId:     !Ref PublicSubnet1
      RouteTableId: !Ref PublicRouteTable

  PublicSubnet2RouteAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId:     !Ref PublicSubnet2
      RouteTableId: !Ref PublicRouteTable

  # ── Private Route Tables (separate per AZ, each uses its own NAT GW) ──────────
  PrivateRouteTable1:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref Vpc
      Tags:
        - Key: Name
          Value: !Sub "cptrack-rtb-private-1-${Environment}"

  PrivateRoute1:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId:         !Ref PrivateRouteTable1
      DestinationCidrBlock: "0.0.0.0/0"
      NatGatewayId:         !Ref NatGateway1

  PrivateSubnet1RouteAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId:     !Ref PrivateSubnet1
      RouteTableId: !Ref PrivateRouteTable1

  PrivateRouteTable2:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref Vpc
      Tags:
        - Key: Name
          Value: !Sub "cptrack-rtb-private-2-${Environment}"

  PrivateRoute2:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId:         !Ref PrivateRouteTable2
      DestinationCidrBlock: "0.0.0.0/0"
      NatGatewayId:         !Ref NatGateway2

  PrivateSubnet2RouteAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId:     !Ref PrivateSubnet2
      RouteTableId: !Ref PrivateRouteTable2

Outputs:
  VpcId:
    Value: !Ref Vpc
    Export: { Name: !Sub "${AWS::StackName}-VpcId" }

  PublicSubnet1Id:
    Value: !Ref PublicSubnet1
    Export: { Name: !Sub "${AWS::StackName}-PublicSubnet1Id" }

  PublicSubnet2Id:
    Value: !Ref PublicSubnet2
    Export: { Name: !Sub "${AWS::StackName}-PublicSubnet2Id" }

  PrivateSubnet1Id:
    Value: !Ref PrivateSubnet1
    Export: { Name: !Sub "${AWS::StackName}-PrivateSubnet1Id" }

  PrivateSubnet2Id:
    Value: !Ref PrivateSubnet2
    Export: { Name: !Sub "${AWS::StackName}-PrivateSubnet2Id" }
