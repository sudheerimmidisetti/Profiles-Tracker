# /etc/nginx/sites-available/cptrack
# Domain: api.dealance.app → Node.js backend on port 3000
#
# To install:
#   sudo cp nginx.conf /etc/nginx/sites-available/cptrack
#   sudo ln -s /etc/nginx/sites-available/cptrack /etc/nginx/sites-enabled/
#   sudo certbot --nginx -d api.dealance.app
#   sudo nginx -t && sudo systemctl reload nginx

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name api.dealance.app;

    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — proxy to Node.js
server {
    listen 443 ssl http2;
    server_name api.dealance.app;

    # SSL certificates (Certbot fills these in automatically)
    ssl_certificate     /etc/letsencrypt/live/api.dealance.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.dealance.app/privkey.pem;

    # Modern SSL config
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;

    # Security headers
    add_header X-Frame-Options        "SAMEORIGIN";
    add_header X-XSS-Protection       "1; mode=block";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy        "strict-origin-when-cross-origin";

    # Gzip
    gzip on;
    gzip_types application/json text/plain;

    # Proxy to Node.js on port 3000
    location / {
        proxy_pass          http://127.0.0.1:3000;
        proxy_http_version  1.1;
        proxy_set_header    Upgrade     $http_upgrade;
        proxy_set_header    Connection  'upgrade';
        proxy_set_header    Host        $host;
        proxy_set_header    X-Real-IP   $remote_addr;
        proxy_set_header    X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
        proxy_cache_bypass  $http_upgrade;
        proxy_read_timeout  60s;
        proxy_send_timeout  60s;

        # Upload size (for any file uploads later)
        client_max_body_size 10M;
    }

    # Health check (fast response, no logging)
    location /health {
        proxy_pass http://127.0.0.1:3000/health;
        access_log off;
    }
}
